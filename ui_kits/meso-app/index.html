<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Meso — app UI kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #F4F3F0; font-family: 'Inter', sans-serif; color: #141412; -webkit-font-smoothing: antialiased; }
  @keyframes shimmer { 0% { background-position: -800px 0; } 100% { background-position: 800px 0; } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes slide { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .rise { animation: rise 400ms cubic-bezier(0.16,1,0.3,1) both; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="TeamsScreen.jsx"></script>
<script type="text/babel" src="TeamDetail.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [active, setActive] = useState('teams');
  const [openTeam, setOpenTeam] = useState(null);
  const [modal, setModal] = useState(false);
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const t = setTimeout(() => setLoading(false), 800);
    return () => clearTimeout(t);
  }, []);

  const showToast = (kind, msg) => {
    setToast({ kind, msg });
    setTimeout(() => setToast(null), 4000);
  };

  const crumbs = openTeam ? ['Operating model', 'Teams', openTeam.name] : [active === 'teams' ? 'Operating model' : '', active.charAt(0).toUpperCase() + active.slice(1)];

  return (
    <div>
      <Sidebar active={active} onNavigate={(id) => { setActive(id); setOpenTeam(null); }} />
      <div style={{ marginLeft: 60, minHeight: '100vh', background: '#F4F3F0' }}>
        <Header
          crumbs={crumbs}
          onNewTeam={() => showToast('success', 'New team workflow started. Assign an owner to activate.')}
        />
        <div key={openTeam ? openTeam.id : active} className="rise">
          {active === 'teams' && !openTeam && <TeamsScreen onOpenTeam={setOpenTeam} loading={loading} />}
          {openTeam && <TeamDetail team={openTeam} onBack={() => setOpenTeam(null)} onRemove={() => setModal(true)} />}
          {active !== 'teams' && !openTeam && <EmptyPanel label={active} />}
        </div>
      </div>

      <Modal open={modal} title={`Remove ${openTeam?.name}?`}
        onClose={() => setModal(false)}
        footer={<>
          <Button variant="secondary" onClick={() => setModal(false)}>Cancel</Button>
          <Button variant="danger" onClick={() => { setModal(false); setOpenTeam(null); showToast('error', `Team "${openTeam.name}" removed. 3 dependent workflows re-routed.`); }}>Remove team</Button>
        </>}>
        This team owns 3 workflows and 12 services. Removing it will queue those dependencies for reassignment. This cannot be undone.
      </Modal>

      <div style={{ position: 'fixed', top: 80, right: 24, zIndex: 2000, display: 'flex', flexDirection: 'column', gap: 10 }}>
        {toast && <Toast kind={toast.kind} msg={toast.msg} onDismiss={() => setToast(null)} />}
      </div>
    </div>
  );
}

function EmptyPanel({ label }) {
  return (
    <div style={{ padding: '80px 40px', maxWidth: 720 }}>
      <div style={{ fontFamily: 'Funnel Display, sans-serif', fontSize: 12, fontWeight: 600, letterSpacing: '-0.2px', color: '#1A6B5C', marginBottom: 8 }}>{label}</div>
      <h1 style={{ fontFamily: 'Funnel Display', fontSize: 38, fontWeight: 700, letterSpacing: '-1.5px', lineHeight: 1.04, color: '#141412', marginBottom: 16 }}>{label.charAt(0).toUpperCase() + label.slice(1)}</h1>
      <p style={{ fontSize: 15, color: '#6B6966', lineHeight: 1.7 }}>Section scaffolded in the kit but not interactive — see the Teams tab for the full click-through demo.</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
